<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margarita 3D Realista</title>
    <style>
        :root {
            --petal-color: #ffffff;
            --center-color: #ffcc00;
            --stem-color: #2d5a27;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        .garden {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Contenedor principal de la flor */
        .flower {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg);
            animation: sway 5s ease-in-out infinite;
            bottom: 100px;
        }

        /* Tallo con gradiente y grosor */
        .stem {
            position: absolute;
            width: 8px;
            height: 350px;
            background: linear-gradient(to bottom, var(--stem-color), #1a3317);
            left: -4px;
            top: 0;
            border-radius: 4px;
            transform-origin: top;
        }

        /* Centro de la flor (Pistilo) */
        .center {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffe041 0%, #d4a017 70%, #8b6d05 100%);
            border-radius: 50%;
            top: -25px;
            left: -25px;
            transform: rotateX(90deg);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 20px rgba(255,204,0,0.4);
            z-index: 10;
        }

        /* Estilo base de los pétalos */
        .petal {
            position: absolute;
            width: 25px;
            height: 90px;
            background: linear-gradient(to top, #f0f0f0 0%, #ffffff 50%, #e0e0e0 100%);
            border-radius: 50% 50% 45% 45%;
            left: -12.5px;
            top: -90px;
            transform-origin: bottom center;
            clip-path: ellipse(50% 50% at 50% 50%);
            box-shadow: inset 0 -10px 10px rgba(0,0,0,0.05);
            opacity: 0.95;
        }

        /* Partículas de polen */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            filter: blur(1px);
        }

        @keyframes sway {
            0%, 100% { transform: rotateX(-20deg) rotateZ(-3deg); }
            50% { transform: rotateX(-15deg) rotateZ(3deg); }
        }

    </style>
</head>
<body>

    <div class="garden">
        <div class="flower" id="flower">
            <div class="stem"></div>
            <div class="center"></div>
            </div>
    </div>

    <script>
        const flower = document.getElementById('flower');
        const petalCount = 24; // Más pétalos para que se vea tupida

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // Calculamos la rotación alrededor del centro (Y) 
            // y una ligera inclinación hacia afuera (X) para el efecto 3D
            const angle = (i * 360) / petalCount;
            const tilt = 70 + Math.random() * 5; // Inclinación natural
            
            petal.style.transform = `
                rotateY(${angle}deg) 
                rotateX(${tilt}deg) 
                translateZ(5px)
            `;
            
            // Pequeña variación de color para realismo
            if (i % 2 === 0) {
                petal.style.filter = 'brightness(0.95)';
            }

            flower.appendChild(petal);
        }

        // Crear ambiente con partículas (polen/estrellas)
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                
                document.body.appendChild(p);
                
                // Animación simple de flotación
                animateParticle(p);
            }
        }

        function animateParticle(p) {
            const duration = Math.random() * 10000 + 5000;
            const keyframes = [
                { transform: 'translate(0, 0)', opacity: 0.5 },
                { transform: `translate(${Math.random() * 100 - 50}px, -100px)`, opacity: 0 }
            ];
            
            const anim = p.animate(keyframes, {
                duration: duration,
                iterations: Infinity
            });
        }

        createParticles();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Girasol grande</title>

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
}

/* contenedor */

.scene{
    position:absolute;
    left:50%;
    top:60%;
    transform:translate(-50%,-50%);
}

/* tallo */

.stem{
    position:absolute;
    width:14px;
    height:420px;
    background:linear-gradient(#4cff4c,#0f5f0f);
    left:50%;
    top:50%;
    transform:translateX(-50%);
    border-radius:10px;
}

/* hojas */

.leaf{
    position:absolute;
    width:120px;
    height:60px;
    background:linear-gradient(#3cff5a,#0a5f1f);
    border-radius:60px 60px 0 60px;
    top:120px;
    left:50%;
}

.leaf2{
    transform:translateX(-140px) rotate(-40deg);
}

.leaf3{
    transform:translateX(20px) rotate(40deg);
}

/* centro */

.center{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(#5a2d00,#1a0c00);
    left:50%;
    top:50%;
    transform:translate(-50%,-90px);
    box-shadow:0 0 40px #ff9900;
}

/* petalos */

.petal{
    position:absolute;
    width:40px;
    height:160px;
    background:linear-gradient(#ffd000,#ff8c00);
    border-radius:50%;
    left:50%;
    top:50%;
    transform-origin:50% 260px;
}

/* particulas */

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 8px white;
}

</style>
</head>
<body>

<div class="scene" id="flower">

    <div class="stem"></div>

    <div class="leaf leaf2"></div>
    <div class="leaf leaf3"></div>

    <div class="center"></div>

</div>

<script>

const flower = document.getElementById("flower");

let petals=[];


/* capa 1 */

for(let i=0;i<32;i++){

    let p=document.createElement("div");

    p.className="petal";

    let a=i*(360/32);

    p.style.transform=
        "translate(-50%,-260px) rotate("+a+"deg)";

    flower.appendChild(p);
}


/* capa 2 */

for(let i=0;i<32;i++){

    let p=document.createElement("div");

    p.className="petal";

    let a=i*(360/32)+5;

    p.style.height="140px";

    p.style.transform=
        "translate(-50%,-250px) rotate("+a+"deg)";

    flower.appendChild(p);
}



/* particulas */

let parts=[];

for(let i=0;i<100;i++){

    let d=document.createElement("div");

    d.className="particle";

    d.x=Math.random()*window.innerWidth;
    d.y=Math.random()*window.innerHeight;
    d.speed=Math.random()*0.3+0.1;

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";

    document.body.appendChild(d);

    parts.push(d);
}



/* viento */

let t=0;

function animate(){

    t+=0.02;

    let wind=Math.sin(t)*4;

    flower.style.transform=
        "translate(-50%,-50%) rotate("+wind+"deg)";


    parts.forEach(p=>{

        p.y-=p.speed;

        if(p.y<0){
            p.y=window.innerHeight;
        }

        p.style.top=p.y+"px";

    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>

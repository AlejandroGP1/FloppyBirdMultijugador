<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulipán 3D Animado</title>
    <style>
        :root {
            --tulip-color: #ff3a52; /* Rojo vibrante */
            --tulip-dark: #8b0000;
            --stem-color: #3e7d32;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center; /* Centrado para móvil */
            overflow: hidden;
            perspective: 1200px;
        }

        .garden {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center; 
        }

        /* Contenedor del Tulipán */
        .flower {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-15deg);
            animation: sway 6s ease-in-out infinite;
            /* Subimos un poco la posición para que el tallo se vea largo */
            margin-top: -150px; 
        }

        /* Tallo */
        .stem {
            position: absolute;
            width: 10px;
            height: 380px;
            background: linear-gradient(to bottom, var(--stem-color), #1a3317);
            left: -5px;
            top: 0;
            border-radius: 5px;
            transform-origin: top center;
        }

        /* Hoja del tallo */
        .leaf {
            position: absolute;
            width: 40px;
            height: 120px;
            background: var(--stem-color);
            border-radius: 0 100% 0 100%;
            left: 5px;
            top: 150px;
            transform-origin: left bottom;
            transform: rotateZ(-20deg) rotateY(30deg);
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* Pétalos de Tulipán */
        .petal {
            position: absolute;
            width: 60px;
            height: 110px;
            background: linear-gradient(to top, var(--tulip-dark) 0%, var(--tulip-color) 60%, #ff6b81 100%);
            /* Forma de cuchara */
            border-radius: 50% 50% 40% 40%;
            left: -30px;
            top: -105px; /* Ajustado para que nazcan del final del tallo */
            transform-origin: bottom center;
            opacity: 0.98;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        /* Partículas de ambiente */
        .particle {
            position: absolute;
            background: #ffb7c5;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.4;
            filter: blur(1px);
        }

        @keyframes sway {
            0%, 100% { transform: rotateX(-15deg) rotateZ(-3deg) rotateY(-5deg); }
            50% { transform: rotateX(-10deg) rotateZ(3deg) rotateY(5deg); }
        }

    </style>
</head>
<body>

    <div class="garden">
        <div class="flower" id="flower">
            <div class="stem">
                <div class="leaf"></div>
            </div>
            </div>
    </div>

    <script>
        const flower = document.getElementById('flower');
        
        // Un tulipán suele tener 6 pétalos principales (dos capas de 3)
        const petalCount = 6; 

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            const angle = (i * 360) / petalCount;
            
            // Lógica de Tulipán:
            // 1. Giramos en Y para rodear el tallo.
            // 2. Inclinamos en X hacia ADENTRO (en lugar de 80deg de la margarita, usamos un ángulo cerrado)
            // 3. Añadimos un pequeño desfase en Z para que se solapen como capas.
            
            const layerOffset = (i % 2 === 0) ? 2 : 8; // Crea capas internas y externas
            const tilt = (i % 2 === 0) ? 25 : 35;    // Unos pétalos más abiertos que otros

            petal.style.transform = `
                rotateY(${angle}deg) 
                rotateX(${tilt}deg) 
                translateZ(${layerOffset}px)
            `;

            // Variación de color para las capas
            if (i % 2 === 0) {
                petal.style.filter = 'brightness(0.8)';
            }

            flower.appendChild(petal);
        }

        // Partículas románticas/pétalos flotando
        function createParticles() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                
                document.body.appendChild(p);
                
                p.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 0.4 },
                    { transform: `translate(${Math.random() * 100 - 50}px, -150px) rotate(360deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 8000 + 4000,
                    iterations: Infinity
                });
            }
        }

        createParticles();
    </script>
</body>
</html>

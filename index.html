<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Isa 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Floating Background Hearts -->
    <div class="bg-hearts" id="bg-hearts"></div>

    <div id="start-screen" class="screen active">
        <h1 class="glow-text">✨ LAS INCREIBLES AVENTURAS DEL PALOMO 🌸</h1>
        <p>🕊️ For my wawita por parte de su kiwisito 🕊️</p>
        <div id="start-decorations"></div>
        <div class="main-menu-btns">
            <button id="start-btn" class="premium-btn">¡Empezar Juego! ✨</button>
            <button id="achievements-btn" class="premium-btn-small">Logros 🏆</button>
        </div>
    </div>

    <!-- Pantalla de Logros (Grid) -->
    <div id="achievements-screen" class="screen">
        <h1 class="glow-text-small">Tus Logros 🌸</h1>
        <div id="achievements-grid"></div>
        <button id="back-to-menu" class="premium-btn-small">Volver ✨</button>
    </div>

    <!-- Pantalla de Detalle del Logro (Flor 3D) -->
    <div id="achievement-detail-screen" class="screen">
        <div id="flower-container"></div>
        <div id="flower-phrase" class="phrase-text"></div>
        <button id="back-to-achievements" class="premium-btn-small">Volver 🌸</button>
    </div>

    <div id="game-over-screen" class="screen">
        <h2 class="bounce">✨ ¡Partida Terminada! ✨</h2>
        <p>Puntuación: <span id="final-score-val" class="heartbeat">0</span></p>
        <p id="motivational-phrase">¡Sigue así, mi amor! 💖</p>
        <div id="over-decorations"></div>
        <button id="restart-btn" class="premium-btn">¡Intentar de nuevo! 💖</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="score">Puntos: <span id="score-val">0</span></div>
        <div id="game-area">
            <div class="invuln-aura"></div>
            <!-- Jugador principal -->
            <div id="pigeon"><span style="display:inline-block; transform: scaleX(-1);">🕊️</span></div>
        </div>
        <button id="flap-btn">¡Vuela!</button>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
